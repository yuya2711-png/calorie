<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カロリー計算機</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
    }

    input, select, button {
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      width: 100%;
      margin-bottom: 6px;
    }

    .food-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 0.6fr;
      gap: 6px;
      margin-bottom: 10px;
    }

    .cal-display {
      background: #eee;
      text-align: right;
    }

    .delete-btn {
      background: #ff6666;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: bold;
    }

    .edit-btn {
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 4px;
    }

    .saved-food-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      gap: 6px;
    }

    .saved-food-actions {
      display: flex;
      gap: 4px;
    }

    .custom-food {
      display: none;
      background: #f0f8ff;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }

    .result {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin: 6px 0 12px;
    }
  </style>
</head>

<body>
<div class="container">
  <h2>カロリー計算機</h2>

  <label>一回の総カロリー</label>
  <input type="number" id="totalCalories" value="150">

  <h3>食事内容</h3>
  <div id="foods"></div>

  <button onclick="calculate()">計算</button>

  <div class="result">
    残りカロリー：<span id="result">0</span> kcal
  </div>

  <button onclick="addFood()">＋ 食材を追加</button>

  <button onclick="toggleCustomFood()">
    食材がリストにない場合はこちら
  </button>

  <!-- 新規・編集共通フォーム -->
  <div class="custom-food" id="customFoodArea">
    <h3 id="customTitle">食材を追加</h3>

    <input id="customName" placeholder="食材名">
    <input id="customGram" type="number" placeholder="総量（g）">
    <input id="customTotalCal" type="number" placeholder="総カロリー（kcal）">

    <button onclick="saveCustomFood()">保存</button>
  </div>

  <h3>追加済み食材</h3>
  <div id="savedFoodList"></div>
</div>

<script>
  // カロリー計算に使う値をページ更新毎に更新する
  const input = document.getElementById("totalCalories");
  const defaultValue = "150";

  // 保存されてる値を取得（なければデフォルト）
  input.value = localStorage.getItem("totalCalories") ?? defaultValue;

  // 入力が変わるたびに保存
  input.addEventListener("input", () => {
    localStorage.setItem("totalCalories", input.value);
  });
</script>

<script src="food.js"></script>

<script src="calculator-system.js"></script>
</body>
</html>
